name: Auto-commit Modified Files

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  commit-files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git user
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get modified files
        id: changed-files
        run: |
          BASE_SHA=${{ github.event.pull_request.base.sha }}
          HEAD_SHA=${{ github.event.pull_request.head.sha }}
          MODIFIED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" \
            | grep -E '\.(sh|py|yml|tf|md)$' || true)
          echo "files=$(echo "$MODIFIED" | tr '\n' ' ' | sed 's/ $//')" >> "$GITHUB_OUTPUT"
          if [ -n "$MODIFIED" ]; then
            echo "Modified files detected:"
            echo "$MODIFIED"
          else
            echo "No relevant modified files found."
          fi

      - name: Commit any staged changes
        if: steps.changed-files.outputs.files != ''
        run: |
          # Stage all tracked modifications
          git add -u

          # Nothing to commit → exit cleanly
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: auto-commit modified files [skip ci]"

          # Pull remote changes (rebase) to handle any upstream commits
          # before pushing, to avoid merge conflicts.
          git pull --rebase origin "${{ github.head_ref }}" || {
            echo "Rebase failed – aborting and exiting without push."
            git rebase --abort
            exit 1
          }

          # --force-with-lease ensures the push is rejected if the remote
          # has received new commits since our rebase, preventing overwrites.
          git push --force-with-lease origin HEAD:${{ github.head_ref }}

      - name: Post file report
        uses: actions/github-script@v7
        if: steps.changed-files.outputs.files != ''
        with:
          script: |
            const files = `${{ steps.changed-files.outputs.files }}`.trim().split(/\s+/);
            const fileLines = files
              .filter(f => f.length > 0)
              .map(f => `- \`${f}\``)
              .join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '## 📝 Modified Files Report',
                '',
                'The following files were modified in this PR:',
                '',
                fileLines,
              ].join('\n'),
            });
