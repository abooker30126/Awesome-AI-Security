name: GPG Sign Modified Files

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  sign-files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git user
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Import GPG private key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          # Pre-configure passphrase so batch signing works
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          gpgconf --reload gpg-agent

      - name: Get modified files
        id: changed-files
        run: |
          BASE_SHA=${{ github.event.pull_request.base.sha }}
          HEAD_SHA=${{ github.event.pull_request.head.sha }}
          MODIFIED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" \
            | grep -E '\.(sh|py|yml|tf)$' || true)
          echo "files=$(echo "$MODIFIED" | tr '\n' ' ' | sed 's/ $//')" >> "$GITHUB_OUTPUT"
          if [ -n "$MODIFIED" ]; then
            echo "Modified files detected:"
            echo "$MODIFIED"
          else
            echo "No relevant modified files found."
          fi

      - name: Sign modified files
        if: steps.changed-files.outputs.files != ''
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          MODIFIED_FILES: ${{ steps.changed-files.outputs.files }}
        run: |
          chmod +x .github/scripts/sign-files.sh
          # Pass the list via stdin to avoid shell-expansion issues with spaces in names
          echo "$MODIFIED_FILES" | tr ' ' '\n' | \
            xargs -d '\n' -I{} .github/scripts/sign-files.sh "{}"

      - name: Commit signatures
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          # Stage any new/changed .sig files
          git add '*.sig' || true

          # Nothing to commit → exit cleanly
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: add GPG signatures for modified files [skip ci]"

          # Pull remote changes (rebase) before pushing to avoid conflicts
          git pull --rebase origin "${{ github.head_ref }}" || {
            echo "Rebase failed – aborting and exiting without push."
            git rebase --abort
            exit 1
          }

          # --force-with-lease prevents overwriting any remote commits we
          # didn't account for in the rebase above.
          git push --force-with-lease origin HEAD:${{ github.head_ref }}

      - name: Post signature report
        uses: actions/github-script@v7
        if: steps.changed-files.outputs.files != ''
        with:
          script: |
            const files = `${{ steps.changed-files.outputs.files }}`.trim().split(/\s+/);
            const sigLines = files
              .filter(f => f.length > 0)
              .map(f => `- \`${f}\` → \`${f}.gpg.sig\``)
              .join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '## 🔏 GPG Signature Report',
                '',
                'The following files were signed in this PR:',
                '',
                sigLines,
                '',
                'To verify a signature locally:',
                '```bash',
                'gpg --verify <file>.gpg.sig <file>',
                '```',
                '',
                'See [`.github/SECURITY_KEYS.md`](.github/SECURITY_KEYS.md) for full verification instructions.',
              ].join('\n'),
            });
